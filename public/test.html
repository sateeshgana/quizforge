<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Sticky Header Table</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    padding:20px;
}

.table-container{

    width:100%;
    max-height:450px;

    overflow:auto;

    -webkit-overflow-scrolling:touch;

    border:1px solid #ccc;

}

/* Important for Safari */
table{

    width:1600px;

    border-collapse:separate;
    border-spacing:0;

}

th,
td{

    padding:12px;
    border:1px solid #ddd;
    white-space:nowrap;
    background:#fff;

}

thead th{

    position:sticky;

    top:0;

    z-index:5;

    background:#1976d2;
    color:white;

}

/* Optional sticky first column */

th:first-child,
td:first-child{

    position:sticky;

    left:0;

    z-index:4;

    background:#fafafa;

}

thead th:first-child{

    z-index:10;

    background:#1565c0;
    color:#fff;

}

tbody tr:nth-child(even){
    background:#f7f7f7;
}

tbody tr:nth-child(even) td{
    background:#f7f7f7;
}

tbody tr:hover td{
    background:#fff7d1;
}

</style>

</head>

<body>

<h2>Sticky Header + Horizontal Scroll</h2>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Location</th>
<th>Phone</th>
<th>Manager</th>
<th>Project</th>
<th>Status</th>
<th>Created</th>
<th>Updated</th>
<th>Salary</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<script>

const tbody=document.getElementById("tbody");

for(let i=1;i<=200;i++){

tbody.innerHTML+=`

<tr>

<td>${i}</td>
<td>Employee ${i}</td>
<td>employee${i}@company.com</td>
<td>Engineering</td>
<td>Hyderabad</td>
<td>9876543210</td>
<td>Manager ${i}</td>
<td>Project ${i}</td>
<td>Active</td>
<td>2026-07-08</td>
<td>2026-07-08</td>
<td>$${(5000+i)}</td>

</tr>

`;

}

</script>

</body>
</html>
